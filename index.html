<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<title>第32課 周教练</title>

<style>

body{
    font-family:Arial,sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:20px;
}

h1{
    font-size:40px;
}

.card{
    background:white;
    border-radius:15px;
    padding:30px;
    max-width:800px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}


#hanzi{
    font-size:80px;
    font-weight:bold;
    margin-top:30px;

    font-family:STKaiti, KaiTi, serif;
}

#pinyin{
    font-size:40px;
    color:blue;
    margin-top:10px;
}

#english{
    font-size:35px;
    color:green;
    margin-top:10px;
}

#japanese{
    font-size:35px;
    color:red;
    margin-top:10px;

    font-family:"游教科書体 横用";
}

button{
    font-size:24px;
    padding:12px 20px;
    margin:8px;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>第32課 周教练</h1>

<div id="progress">
進捗 1 / 1
</div>

<br>

<div class="card">

<div id="hanzi"></div>

<div id="pinyin"></div>

<div id="english"></div>

<div id="japanese"></div>

<br>

<button onclick="prevWord()">
⬅ 前へ
</button>

<button onclick="nextWord()">
次へ ➡
</button>

<br>


<button onclick="speakChinese()">
🔊 発音
</button>

<button onclick="showPinyin()">
拼音
</button>

<button onclick="showEnglish()">
English
</button>

<button onclick="showJapanese()">
日本語
</button>

<br>

<button onclick="showTextWords()">
本文
</button>

<button onclick="showReadWords()">
识读字
</button>


<button onclick="showWriteWords()">
识写字
</button>

<button onclick="showVocabWords()">
读词语
</button>

<button onclick="showExtendedWords()">
拓展词语
</button>

<br><br>

<button onclick="wrongWord()">
❌ 答错
</button>

<button onclick="reviewWrongWords()">
📚 答错复习
</button>


</div>

<script src="words.js"></script>
<script src="app.js"></script>

</body>
</html>
